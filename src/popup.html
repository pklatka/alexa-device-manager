<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <header>
    <div class="header-title">
      <img src="../icons/icon128.png" alt="icon">
      <div class="header-title-text">
        <h2>Alexa Device Manager</h2>
      </div>
    </div>
    <div class="header-actions">
      <button id="refresh-btn" class="refresh-btn" disabled>
        <img src="../icons/refresh.svg" alt="refresh" class="refresh-icon">
        Refresh
      </button>
      <button id="delete-all-btn" class="delete-all-btn" disabled>
        <img src="../icons/bin.svg" alt="delete" class="delete-icon">
        Delete all
      </button>
    </div>
  </header>

  <main>
    <div id="spinner" class="spinner"></div>
    <div id="status" class="status large info">Checking session...</div>
    <div id="device-list" class="device-list"></div>
    <div id="progress-container" class="progress-container">
      <div class="progress-label" id="progress-label">Deleting devices…</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-counter" id="progress-counter">0 / 0 deleted</div>
      <button id="progress-refresh-btn" class="progress-refresh-btn">Refresh</button>
    </div>
  </main>

  <footer>
    <a href="https://github.com/sponsors/pklatka" target="_blank">♥ Support this project</a>
  </footer>

  <div id="confirm-dialog" class="dialog-overlay">
    <div class="dialog-card">
      <div class="dialog-icon">⚠️</div>
      <div class="dialog-title">Delete All Devices</div>
      <div class="dialog-message">Are you sure you want to delete <strong>all</strong> devices listed below? This action
        cannot be undone.</div>
      <div class="dialog-actions">
        <button id="dialog-cancel" class="dialog-btn dialog-btn-cancel">Cancel</button>
        <button id="dialog-confirm" class="dialog-btn dialog-btn-confirm">Delete All</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
